<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 启动中</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* Light (Red Theme) */
      --bg: #f8f6f2;
      --card-bg: #ffffff;
      --text: #1f2937;
      --text-muted: #6b7280;
      --accent: #dc2626;
      --accent-hover: #b91c1c;
      --accent-subtle: rgba(220, 38, 38, 0.08);
      --accent-glow: rgba(220, 38, 38, 0.15);
      --logo-bg: linear-gradient(135deg, #dc2626, #ef4444);
      --logo-shadow: rgba(220, 38, 38, 0.25);
      --spinner-track: rgba(220, 38, 38, 0.12);
      --spinner-accent: #dc2626;
      --border: #e5e7eb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        /* Dark (Purple Theme) */
        --bg: #1a1a2e;
        --card-bg: transparent;
        --text: #e0e0e0;
        --text-muted: #888;
        --accent: #6c63ff;
        --accent-hover: #5a52d5;
        --accent-subtle: rgba(108, 99, 255, 0.1);
        --accent-glow: rgba(108, 99, 255, 0.25);
        --logo-bg: linear-gradient(135deg, #6c63ff, #a78bfa);
        --logo-shadow: rgba(108, 99, 255, 0.3);
        --spinner-track: rgba(108, 99, 255, 0.15);
        --spinner-accent: #6c63ff;
        --border: #2a2a3e;
      }
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      user-select: none;
      transition: background 0.3s, color 0.3s;
      padding-top: 38px;
    }

    .container { text-align: center; }

    /* Drag region at top for hidden title bar */
    .titlebar-spacer {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 38px;
      -webkit-app-region: drag;
      z-index: 100;
    }

    .logo {
      width: 64px; height: 64px;
      margin: 0 auto 28px;
      background: var(--logo-bg);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 8px 32px var(--logo-shadow);
      transition: background 0.3s, box-shadow 0.3s;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--spinner-track);
      border-top-color: var(--spinner-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
      transition: border-color 0.3s;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      transition: color 0.3s;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      transition: color 0.3s;
    }
  </style>
</head>
<body>
  <div class="titlebar-spacer"></div>
  <div class="container">
    <div class="logo">🦞</div>
    <div class="spinner"></div>
    <div class="title">正在启动 OpenClaw 网关</div>
    <div class="subtitle">请稍候，网关启动中…</div>
  </div>
</body>
</html>
